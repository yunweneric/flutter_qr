<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter QR — customizable QR code generator for the web.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Flutter QR">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Flutter QR</title>
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --bg: #F6F6F8;
      --brand: #02569B;
      --text: #18181B;
      --track: #E4E4EA;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090B;
        --brand: #54B4F4;
        --text: #FAFAFA;
        --track: #27272A;
      }
    }

    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); }

    #flutter-qr-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      opacity: 1;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }
    #flutter-qr-loader.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .fqr-logo {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(2, 86, 155, 0.35);
      animation: fqr-pop 0.6s cubic-bezier(0.16, 1, 0.3, 1) both,
                 fqr-breathe 2.4s ease-in-out 0.6s infinite;
    }
    .fqr-logo img { width: 36px; height: 36px; border-radius: 6px; }

    .fqr-title {
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin: 0;
      opacity: 0;
      animation: fqr-fade-up 0.5s ease 0.15s both;
    }

    .fqr-track {
      width: 132px;
      height: 4px;
      border-radius: 99px;
      background: var(--track);
      overflow: hidden;
      position: relative;
    }
    .fqr-track::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: 99px;
      background: var(--brand);
      animation: fqr-slide 1.15s ease-in-out infinite;
    }

    @keyframes fqr-pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    @keyframes fqr-breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-4px) scale(1.04); }
    }
    @keyframes fqr-fade-up {
      from { transform: translateY(6px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    @keyframes fqr-slide {
      0%   { left: -42%; }
      100% { left: 100%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .fqr-logo, .fqr-title { animation: none; opacity: 1; }
      .fqr-track::after { animation-duration: 2s; }
    }
  </style>
</head>
<body>
  <div id="flutter-qr-loader">
    <div class="fqr-logo">
      <img src="favicon.png" alt="Flutter QR" width="36" height="36">
    </div>
    <p class="fqr-title">Flutter QR</p>
    <div class="fqr-track"></div>
  </div>

  <script>
    // Fades out and removes the splash once Flutter paints its first frame.
    window.__removeFlutterQrLoader = function () {
      var el = document.getElementById('flutter-qr-loader');
      if (!el || el.classList.contains('loaded')) return;
      el.classList.add('loaded');
      window.setTimeout(function () {
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }, 500);
    };
    // Safety net: never trap the user behind the splash.
    window.setTimeout(function () { window.__removeFlutterQrLoader(); }, 15000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
